groups:
  - name: ml_serving_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(prediction_errors_total[5m]) / rate(prediction_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.model_name }}"
          description: "Error rate is above 5% for model {{ $labels.model_name }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(prediction_latency_seconds_bucket[5m])) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.model_name }}"
          description: "P95 latency is above 500ms for model {{ $labels.model_name }}"

      - alert: ModelContainerDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Model container {{ $labels.job }} is down"
          description: "Prometheus cannot reach {{ $labels.job }} for more than 30 seconds"
