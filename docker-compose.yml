services:
  # --- API Gateway (Nginx) ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 32m
    restart: unless-stopped
    networks:
      - ml-network
    depends_on:
      - model-a
      - model-b
      - model-c

  # --- Model A: Iris Classifier ---
  model-a:
    build:
      context: .
      dockerfile: model-a/Dockerfile
    environment:
      - MODEL_NAME=iris_classifier
      - MODEL_VERSION=${MODEL_A_VERSION}
      - MODEL_TYPE=${MODEL_A_TYPE}
      - SCIENTIST_NAME=${MODEL_A_SCIENTIST}
      - PORT=8001
    volumes:
      - model-data:/data/models
      - log-data:/data/logs
    mem_limit: 150m
    restart: unless-stopped
    networks:
      - ml-network

  # --- Model B: House Price Predictor ---
  model-b:
    build:
      context: .
      dockerfile: model-b/Dockerfile
    environment:
      - MODEL_NAME=house_price
      - MODEL_VERSION=${MODEL_B_VERSION}
      - MODEL_TYPE=${MODEL_B_TYPE}
      - SCIENTIST_NAME=${MODEL_B_SCIENTIST}
      - PORT=8002
    volumes:
      - model-data:/data/models
      - log-data:/data/logs
    mem_limit: 150m
    restart: unless-stopped
    networks:
      - ml-network

  # --- Model C: Sentiment Analyzer ---
  model-c:
    build:
      context: .
      dockerfile: model-c/Dockerfile
    environment:
      - MODEL_NAME=sentiment
      - MODEL_VERSION=${MODEL_C_VERSION}
      - MODEL_TYPE=${MODEL_C_TYPE}
      - SCIENTIST_NAME=${MODEL_C_SCIENTIST}
      - PORT=8003
    volumes:
      - model-data:/data/models
      - log-data:/data/logs
    mem_limit: 150m
    restart: unless-stopped
    networks:
      - ml-network

  # --- Monitoring: Prometheus ---
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1h"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    mem_limit: 80m
    restart: unless-stopped
    networks:
      - ml-network

  # --- Monitoring: Grafana ---
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=mlserving
      - GF_SERVER_HTTP_PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    mem_limit: 100m
    restart: unless-stopped
    networks:
      - ml-network
    depends_on:
      - prometheus

  # --- Monitoring: cAdvisor ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    mem_limit: 60m
    restart: unless-stopped
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge

volumes:
  model-data:
  log-data:
  prometheus-data:
  grafana-data:
